services:
  # 1. Backend Express Web Service
  - type: web
    name: medlinka-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: medlinka-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://medlinka-client.onrender.com

  # 2. Frontend Vite React Static Site
  - type: web
    name: medlinka-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://medlinka-server.onrender.com
      - key: VITE_SOCKET_URL
        value: https://medlinka-server.onrender.com
    routes:
      # Redirect/Rewrite rule for SPA React Router
      - type: rewrite
        source: /*
        destination: /index.html

# 3. PostgreSQL Database Instance
databases:
  - name: medlinka-db
    plan: free
